name: Gemini Batch Polling & Alerts

on:
  schedule:
    # Runs at minutes 5, 20, 35, and 50 past the hour, every hour, every day
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  execute-polling:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Polling Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python script_2_poll.py

      - name: Commit and Push Database State
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 chore(db): update batch polling status and alerts"
          file_pattern: 'nse_pipeline.db'
          skip_dirty_check: false
