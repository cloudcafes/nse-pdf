name: Data Ingestion & Batch Submission

on:
  schedule:
    # Runs at 10:30 UTC (4:00 PM IST) Monday through Friday
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  execute-ingestion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ingestion Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python script_1_ingest.py

      - name: Commit and Push Database State
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 chore(db): track new batch job submission"
          file_pattern: 'nse_pipeline.db'
          skip_dirty_check: false
