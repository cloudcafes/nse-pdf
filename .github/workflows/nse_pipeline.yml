name: NSE Corporate Filings Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * 1-5'

# 1. CRITICAL: Grant the workflow permission to push commits
permissions:
  contents: write

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Required to allow the auto-commit action to push changes
          ref: ${{ github.head_ref }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NSE Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python announcement.py

      # 2. Commit the database back to the repository
      - name: Commit and Push Database State
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 chore: update NSE database state"
          file_pattern: 'nse_pipeline.db'
          # Prevent failing if no new data was downloaded/analyzed
          skip_dirty_check: false